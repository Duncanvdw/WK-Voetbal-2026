<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 — Live Score</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0f1e;--surface:#111827;--border:rgba(255,255,255,0.08);
  --text:#f0f4ff;--muted:#6b7a99;--accent:#e8b84b;
  --live:#ef4444;--goal:#22c55e;--font:'Inter',system-ui,sans-serif;
}
html,body{height:100%}
body{
  font-family:var(--font);background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:2rem 1rem;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background-image:
    radial-gradient(1px 1px at 12% 18%,rgba(255,255,255,.35) 0%,transparent 100%),
    radial-gradient(1px 1px at 44% 62%,rgba(255,255,255,.25) 0%,transparent 100%),
    radial-gradient(1px 1px at 71% 28%,rgba(255,255,255,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 89% 74%,rgba(255,255,255,.2) 0%,transparent 100%),
    radial-gradient(1px 1px at 56% 8%,rgba(255,255,255,.28) 0%,transparent 100%),
    radial-gradient(1px 1px at 24% 88%,rgba(255,255,255,.18) 0%,transparent 100%),
    radial-gradient(1px 1px at 96% 14%,rgba(255,255,255,.32) 0%,transparent 100%),
    radial-gradient(1px 1px at 4% 52%,rgba(255,255,255,.22) 0%,transparent 100%);
}
.wrap{position:relative;z-index:1;width:100%;max-width:500px}
.header{text-align:center;margin-bottom:1.75rem}
.trophy{font-size:2.2rem;display:block;margin-bottom:.4rem}
.header h1{font-size:11px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--accent)}
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:2rem;position:relative;overflow:hidden;
}
.top-line{
  position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  opacity:0;transition:opacity .4s;
}
.card.live .top-line{opacity:1}
.status-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
.pill-live{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);
  color:#f87171;font-size:11px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;padding:4px 10px;border-radius:100px;
}
.dot{width:6px;height:6px;border-radius:50%;background:var(--live);animation:blink 1.2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.pill-ht{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(232,184,75,.12);border:1px solid rgba(232,184,75,.3);
  color:var(--accent);font-size:11px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;padding:4px 10px;border-radius:100px;
}
.pill-ft,.pill-up{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(255,255,255,.06);border:1px solid var(--border);
  color:var(--muted);font-size:11px;font-weight:500;padding:4px 10px;border-radius:100px;
}
.group-tag{font-size:12px;color:var(--muted)}
.matchup{display:flex;align-items:center;justify-content:center;gap:.75rem;margin-bottom:1rem}
.team{display:flex;flex-direction:column;align-items:center;gap:10px;flex:1}
.flag{font-size:60px;line-height:1;filter:drop-shadow(0 4px 16px rgba(0,0,0,.5))}
.team-name{font-size:14px;font-weight:500;color:var(--text);text-align:center}
.score-mid{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:110px}
.score-row{display:flex;align-items:center;gap:6px}
.snum{font-size:76px;font-weight:900;color:var(--text);line-height:1;min-width:44px;text-align:center;}
.snum.bump{animation:bump .4s ease-out}
@keyframes bump{0%{transform:scale(1.45);color:var(--goal)}60%{transform:scale(.96)}100%{transform:scale(1)}}
.ssep{font-size:44px;font-weight:300;color:var(--muted);line-height:1;margin-top:-6px}
.venue{font-size:11px;color:var(--muted);text-align:center;margin-top:.25rem}
.ko-time{font-size:26px;font-weight:700;color:var(--accent);text-align:center}
.ko-date{font-size:11px;color:var(--muted);text-align:center;margin-top:2px}

/* Manual score controls */
.manual-controls{
  display:flex;align-items:center;justify-content:center;gap:1.5rem;
  margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--border);
}
.team-ctrl{display:flex;align-items:center;gap:8px}
.ctrl-label{font-size:11px;color:var(--muted);min-width:50px;text-align:center}
.btn-score{
  width:32px;height:32px;border-radius:8px;border:1px solid var(--border);
  background:rgba(255,255,255,.05);color:var(--text);font-size:18px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .15s,border-color .15s;font-family:var(--font);
  line-height:1;user-select:none;
}
.btn-score:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.2)}
.btn-score:active{transform:scale(.92)}
.btn-score.plus{color:var(--goal)}
.btn-score.minus{color:#f87171}
.manual-label{
  font-size:10px;color:var(--muted);text-align:center;
  letter-spacing:.08em;text-transform:uppercase;
}

.goals-wrap{border-top:1px solid var(--border);padding-top:.875rem;margin-top:.75rem;display:flex;flex-direction:column;gap:5px}
.goal-row{display:flex;align-items:center;gap:7px;font-size:13px}
.g-min{color:var(--accent);font-weight:600;min-width:30px}
.g-name{color:var(--text);font-weight:500}
.g-team{color:var(--muted);font-size:12px}
.foot{display:flex;align-items:center;justify-content:space-between;margin-top:1.1rem}
.updated{font-size:11px;color:var(--muted)}
.rbtn{
  background:none;border:1px solid var(--border);color:var(--muted);
  font-size:12px;font-weight:500;padding:5px 12px;border-radius:8px;
  cursor:pointer;display:flex;align-items:center;gap:5px;
  transition:border-color .2s,color .2s;font-family:var(--font);
}
.rbtn:hover{border-color:var(--accent);color:var(--accent)}
.rbtn svg{transition:transform .5s}
.rbtn.spin svg{transform:rotate(360deg)}
#confetti{position:fixed;inset:0;pointer-events:none;z-index:99}
.overlay{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  pointer-events:none;z-index:100;
  /* background and opacity driven purely by JS so reruns always work */
  opacity:0;background:transparent;transition:none;
}
.overlay-bg{
  position:absolute;inset:0;
  animation:none;
}
.overlay-bg.run{animation:bgflash 10s forwards}
@keyframes bgflash{
  0%  {opacity:0}
  3%  {opacity:0.75}
  8%  {opacity:0.45}
  14% {opacity:0.65}
  20% {opacity:0.38}
  28% {opacity:0.58}
  36% {opacity:0.32}
  46% {opacity:0.5}
  58% {opacity:0.25}
  72% {opacity:0.38}
  84% {opacity:0.15}
  100%{opacity:0}
}
.goal-shout{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;gap:.75rem;
  text-align:center;
}
.goal-shout.run{animation:shout 10s ease-out forwards}
@keyframes shout{
  0%  {transform:scale(.3) rotate(-8deg);opacity:0}
  6%  {transform:scale(1.15) rotate(2deg);opacity:1}
  10% {transform:scale(1) rotate(0deg)}
  80% {transform:scale(1);opacity:1}
  100%{transform:scale(1.04);opacity:0}
}
.overlay.run{animation:ovlfade 10s ease-out forwards}
@keyframes ovlfade{0%{opacity:0}4%{opacity:1}80%{opacity:1}100%{opacity:0}}
.goal-word{
  font-size:100px;font-weight:900;letter-spacing:-3px;
  color:var(--team-color, #fff);
  text-shadow:0 0 80px var(--team-color, #fff), 0 0 30px var(--team-color, #fff), 0 4px 20px rgba(0,0,0,.5);
}
.goal-word.run{animation:gcolor 10s forwards}
@keyframes gcolor{
  0%  {color:#fff; text-shadow:0 0 80px #fff,0 0 30px #fff,0 4px 20px rgba(0,0,0,.5)}
  12% {color:var(--team-color,#fff); text-shadow:0 0 80px var(--team-color,#fff),0 0 30px var(--team-color,#fff),0 4px 20px rgba(0,0,0,.5)}
  26% {color:#fff; text-shadow:0 0 80px #fff,0 0 30px #fff,0 4px 20px rgba(0,0,0,.5)}
  40% {color:var(--team-color,#fff); text-shadow:0 0 80px var(--team-color,#fff),0 0 30px var(--team-color,#fff),0 4px 20px rgba(0,0,0,.5)}
  55% {color:#fff; text-shadow:0 0 80px #fff,0 0 30px #fff,0 4px 20px rgba(0,0,0,.5)}
  70% {color:var(--team-color,#fff); text-shadow:0 0 80px var(--team-color,#fff),0 0 30px var(--team-color,#fff),0 4px 20px rgba(0,0,0,.5)}
  85% {color:#fff; text-shadow:0 0 80px #fff,0 0 30px #fff,0 4px 20px rgba(0,0,0,.5)}
  100%{color:var(--team-color,#fff); text-shadow:0 0 80px var(--team-color,#fff),0 0 30px var(--team-color,#fff),0 4px 20px rgba(0,0,0,.5)}
}
.goal-who{font-size:22px;font-weight:600;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,.8)}
.goal-minute{font-size:14px;font-weight:500;color:rgba(255,255,255,.75);margin-top:-.25rem}
.src-badge{
  font-size:10px;color:var(--muted);text-align:center;margin-top:.4rem;
  opacity:.6;letter-spacing:.04em;
}
.err{text-align:center;padding:1.5rem;color:var(--muted);font-size:14px;line-height:1.8}
.debug-panel{margin-top:1rem;background:#0a0f1e;border:1px solid var(--border);border-radius:10px;padding:.75rem;display:none}
.debug-panel.open{display:block}
#debug-log{font-family:monospace;font-size:10px;color:#6b7a99;white-space:pre-wrap;word-break:break-all;max-height:200px;overflow-y:auto;line-height:1.5}
.dbtn{background:none;border:1px solid var(--border);color:var(--muted);font-size:11px;padding:3px 9px;border-radius:6px;cursor:pointer;font-family:var(--font);margin-top:.5rem}
.dbtn:hover{border-color:var(--accent);color:var(--accent)}
@media(max-width:400px){.flag{font-size:44px}.snum{font-size:60px}.card{padding:1.25rem}}
</style>
</head>
<body>

<canvas id="confetti"></canvas>
<div class="overlay" id="overlay">
  <div class="overlay-bg" id="overlayBg"></div>
  <div class="goal-shout">
    <div class="goal-word">GOAL!</div>
    <div class="goal-who" id="goalWho"></div>
    <div class="goal-minute" id="goalMinute"></div>
  </div>
</div>

<div class="wrap">
  <div class="header">
    <span class="trophy">🏆</span>
    <h1>FIFA World Cup 2026</h1>
  </div>
  <div class="card" id="card">
    <div class="top-line"></div>
    <div id="content"><div class="err">Loading…</div></div>
  </div>
  <div class="foot">
    <span class="updated" id="upd">–</span>
    <button class="rbtn" id="rbtn" onclick="fetchAndRender()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M23 4v6h-6M1 20v-6h6"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
      Refresh
    </button>
  </div>
  <button class="dbtn" onclick="document.getElementById('dp').classList.toggle('open');this.textContent=document.getElementById('dp').classList.contains('open')?'Hide debug':'Show debug'">Show debug</button>
  <div class="debug-panel" id="dp"><div id="debug-log">Waiting for fetch...
</div></div>
</div>

<script>
// ─── Flags ───────────────────────────────────────────────────────────────────
const FLAGS = {
  'Mexico':'🇲🇽','South Africa':'🇿🇦','South Korea':'🇰🇷','Czech Republic':'🇨🇿',
  'Canada':'🇨🇦','Bosnia & Herzegovina':'🇧🇦','Qatar':'🇶🇦','Switzerland':'🇨🇭',
  'USA':'🇺🇸','United States':'🇺🇸','Paraguay':'🇵🇾','Australia':'🇦🇺','Turkey':'🇹🇷',
  'Brazil':'🇧🇷','Morocco':'🇲🇦','Croatia':'🇭🇷','Belgium':'🇧🇪',
  'Argentina':'🇦🇷','Algeria':'🇩🇿','Austria':'🇦🇹','Jordan':'🇯🇴',
  'France':'🇫🇷','Senegal':'🇸🇳','Iraq':'🇮🇶','Norway':'🇳🇴',
  'Portugal':'🇵🇹','DR Congo':'🇨🇩','Uzbekistan':'🇺🇿','Colombia':'🇨🇴',
  'England':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','Netherlands':'🇳🇱','Sweden':'🇸🇪','Germany':'🇩🇪',
  'Spain':'🇪🇸','Cape Verde':'🇨🇻','Egypt':'🇪🇬','Saudi Arabia':'🇸🇦',
  'Uruguay':'🇺🇾','Iran':'🇮🇷','New Zealand':'🇳🇿','Ghana':'🇬🇭',
  'Panama':'🇵🇦',"Côte d'Ivoire":'🇨🇮',"Ivory Coast":'🇨🇮','Scotland':'🏴󠁧󠁢󠁳󠁣󠁴󠁿','Haiti':'🇭🇹',
  'Japan':'🇯🇵','Ecuador':'🇪🇨','Cameroon':'🇨🇲','Serbia':'🇷🇸',
  'Denmark':'🇩🇰','Tunisia':'🇹🇳','Poland':'🇵🇱','Nigeria':'🇳🇬',
  'Ukraine':'🇺🇦','Romania':'🇷🇴','Mali':'🇲🇱','Honduras':'🇭🇳',
  'Venezuela':'🇻🇪','Jamaica':'🇯🇲','Wales':'🏴󠁧󠁢󠁷󠁬󠁳󠁿','Slovenia':'🇸🇮',
  'Slovakia':'🇸🇰','Greece':'🇬🇷','Albania':'🇦🇱','Kosovo':'🇽🇰',
};
const flag = n => FLAGS[n] || '🏳';

// ─── Country colors ───────────────────────────────────────────────────────────
const TEAM_COLORS = {
  'Netherlands':'#FF6600','France':'#002395','Brazil':'#009c3b',
  'Germany':'#000000','Argentina':'#74ACDF','Spain':'#AA151B',
  'England':'#CF081F','Portugal':'#006600','Belgium':'#EF3340',
  'Italy':'#003DA5','Croatia':'#FF0000','Netherlands':'#FF6600',
  'Senegal':'#00853F','Morocco':'#C1272D','Nigeria':'#008751',
  'Cameroon':'#007A5E','South Africa':'#007A4D','Ghana':'#006B3F',
  'Egypt':'#CE1126','Tunisia':'#E70013','Algeria':'#006233',
  'DR Congo':'#007FFF','Mali':'#14B53A','Cape Verde':'#003893',
  'USA':'#B22234','United States':'#B22234','Mexico':'#006847',
  'Canada':'#FF0000','Argentina':'#74ACDF','Colombia':'#FCD116',
  'Uruguay':'#5EB6E4','Chile':'#D52B1E','Ecuador':'#FFD100',
  'Paraguay':'#D52B1E','Venezuela':'#CF142B','Bolivia':'#D52B1E',
  'Panama':'#005293','Honduras':'#0073CF','Jamaica':'#000000',
  'Japan':'#BC002D','South Korea':'#003478','Australia':'#00008B',
  'Iran':'#239F40','Saudi Arabia':'#006C35','Iraq':'#CE1126',
  'Jordan':'#007A3D','Uzbekistan':'#1EB53A','Qatar':'#8D1B3D',
  'New Zealand':'#00247D','Switzerland':'#FF0000','Czech Republic':'#D7141A',
  'Poland':'#DC143C','Serbia':'#C6363C','Croatia':'#FF0000',
  'Romania':'#002B7F','Ukraine':'#005BBB','Austria':'#ED2939',
  'Denmark':'#C60C30','Sweden':'#006AA7','Norway':'#EF2B2D',
  'Scotland':'#003DA5','Wales':'#C8102E','Turkey':'#E30A17',
  'Bosnia & Herzegovina':'#002395','Slovenia':'#003DA5','Slovakia':'#EE1C25',
  'Greece':'#0D5EAF','Albania':'#E41E20','Kosovo':'#244AA5',
  'Haiti':'#00209F','Sweden':'#006AA7',
};
function teamColor(name) { return TEAM_COLORS[name] || '#22c55e'; }
let manualH = null, manualA = null;  // null = use API data
let prevH = null, prevA = null;
let currentHome = '', currentAway = '';
let autoTimer = null;
let audioCtx = null;

// ─── Audio ────────────────────────────────────────────────────────────────────
function getAC() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function cheer() {
  try {
    const ctx = getAC();
    if (ctx.state === 'suspended') ctx.resume();
    const sr = ctx.sampleRate;
    const duration = 10;
    const now = ctx.currentTime;

    // Build a crowd noise buffer: layered bandpass-filtered noise voices
    // Each "voice" is a noise source shaped to sound like a human throat
    function makeCrowdLayer(centerFreq, q, vol, attack, decay) {
      const bufLen = sr * duration;
      const buf = ctx.createBuffer(1, bufLen, sr);
      const data = buf.getChannelData(0);

      // Generate noise with gentle amplitude wavering (people aren't perfectly steady)
      for (let i = 0; i < bufLen; i++) {
        // Low-frequency amplitude modulation (0.5–4 Hz) simulates crowd breath rhythm
        const mod1 = 0.7 + 0.3 * Math.sin(2 * Math.PI * i / sr * (0.5 + Math.random() * 0.01));
        const mod2 = 0.8 + 0.2 * Math.sin(2 * Math.PI * i / sr * (2.1 + Math.random() * 0.01));
        data[i] = (Math.random() * 2 - 1) * mod1 * mod2;
      }

      const src = ctx.createBufferSource();
      src.buffer = buf;

      // Bandpass filter shapes noise into a "vocal" frequency band
      const bp = ctx.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = centerFreq;
      bp.Q.value = q;

      // Second bandpass for more realism
      const bp2 = ctx.createBiquadFilter();
      bp2.type = 'bandpass';
      bp2.frequency.value = centerFreq * 1.6;
      bp2.Q.value = q * 0.7;

      const gain = ctx.createGain();
      // Envelope: fast attack burst, hold, then slow fade
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(vol, now + attack);          // burst up
      gain.gain.linearRampToValueAtTime(vol * 0.85, now + 1.5);     // settle
      gain.gain.setValueAtTime(vol * 0.85, now + duration - decay);
      gain.gain.linearRampToValueAtTime(0, now + duration);          // fade out

      src.connect(bp);
      bp.connect(bp2);
      bp2.connect(gain);
      gain.connect(ctx.destination);
      src.start(now);
      src.stop(now + duration + 0.1);
    }

    // Stadium low rumble — crowd body noise
    makeCrowdLayer(180,  0.8, 0.35, 0.05, 1.5);
    // Mid crowd voices — the "aaaah" body
    makeCrowdLayer(420,  1.2, 0.28, 0.08, 2.0);
    makeCrowdLayer(650,  1.0, 0.22, 0.10, 2.5);
    makeCrowdLayer(900,  1.5, 0.18, 0.12, 2.0);
    // High excitement squeals / whistles
    makeCrowdLayer(1400, 2.0, 0.12, 0.15, 3.0);
    makeCrowdLayer(2200, 2.5, 0.08, 0.20, 4.0);

    // Add individual "shout" bursts — staggered peaks that simulate waves of people
    for (let wave = 0; wave < 6; wave++) {
      const waveTime = now + wave * 1.4 + Math.random() * 0.4;
      const wBuf = ctx.createBuffer(1, sr * 1.2, sr);
      const wd = wBuf.getChannelData(0);
      for (let i = 0; i < wd.length; i++) wd[i] = (Math.random() * 2 - 1);
      const wSrc = ctx.createBufferSource();
      wSrc.buffer = wBuf;
      const wBp = ctx.createBiquadFilter();
      wBp.type = 'bandpass';
      wBp.frequency.value = 500 + Math.random() * 600;
      wBp.Q.value = 1.5;
      const wGain = ctx.createGain();
      wGain.gain.setValueAtTime(0, waveTime);
      wGain.gain.linearRampToValueAtTime(0.15 + Math.random() * 0.1, waveTime + 0.08);
      wGain.gain.exponentialRampToValueAtTime(0.001, waveTime + 0.8 + Math.random() * 0.5);
      wSrc.connect(wBp); wBp.connect(wGain); wGain.connect(ctx.destination);
      wSrc.start(waveTime);
      wSrc.stop(waveTime + 1.5);
    }

    // Deep stadium boom at the very start (like a crowd surge)
    const boomBuf = ctx.createBuffer(1, sr * 0.8, sr);
    const bd = boomBuf.getChannelData(0);
    for (let i = 0; i < bd.length; i++) bd[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bd.length, 0.3);
    const boomSrc = ctx.createBufferSource();
    boomSrc.buffer = boomBuf;
    const boomLp = ctx.createBiquadFilter();
    boomLp.type = 'lowpass'; boomLp.frequency.value = 120;
    const boomGain = ctx.createGain();
    boomGain.gain.setValueAtTime(0.6, now);
    boomGain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
    boomSrc.connect(boomLp); boomLp.connect(boomGain); boomGain.connect(ctx.destination);
    boomSrc.start(now); boomSrc.stop(now + 0.9);

  } catch(e) { console.warn('Audio error:', e); }
}

// ─── Confetti ─────────────────────────────────────────────────────────────────
function confetti(teamColor) {
  const cv = document.getElementById('confetti');
  cv.width=window.innerWidth; cv.height=window.innerHeight;
  const base = teamColor || '#22c55e';
  const cols=[base, '#ffffff', '#e8b84b', base+'cc', '#fff', base, '#22c55e', '#fff'];
  const ps=Array.from({length:220},()=>({
    x:Math.random()*cv.width,y:-10,w:5+Math.random()*9,h:3+Math.random()*7,
    r:Math.random()*Math.PI*2,dr:(Math.random()-.5)*.25,
    vx:(Math.random()-.5)*7,vy:2+Math.random()*5,
    grav:.1+Math.random()*.12,col:cols[Math.floor(Math.random()*cols.length)],op:1
  }));
  let fr=0;
  (function draw(){
    const c=cv.getContext('2d');c.clearRect(0,0,cv.width,cv.height);
    ps.forEach(p=>{
      c.save();c.globalAlpha=p.op;c.translate(p.x,p.y);c.rotate(p.r);
      c.fillStyle=p.col;c.fillRect(-p.w/2,-p.h/2,p.w,p.h);c.restore();
      p.x+=p.vx;p.y+=p.vy;p.vy+=p.grav;p.r+=p.dr;
      if(fr>90)p.op=Math.max(0,p.op-.014);
    });
    fr++;
    if(fr<200&&ps.some(p=>p.op>0))requestAnimationFrame(draw);
    else c.clearRect(0,0,cv.width,cv.height);
  })();
}

// ─── Goal celebration ─────────────────────────────────────────────────────────
let celebrateTimer = null;
function celebrate(teamName, rawName) {
  const color = teamColor(rawName || teamName);

  if (celebrateTimer) { clearTimeout(celebrateTimer); celebrateTimer = null; }

  document.getElementById('goalWho').textContent = teamName;
  document.getElementById('goalMinute').textContent = '';

  // Set full background color + CSS variable for text flash
  const bg = document.getElementById('overlayBg');
  bg.style.backgroundColor = color;
  document.getElementById('overlay').style.setProperty('--team-color', color);

  // Force-restart all animations
  const ov    = document.getElementById('overlay');
  const shout = document.querySelector('.goal-shout');
  const word  = document.querySelector('.goal-word');

  [ov, bg, shout, word].forEach(el => { el.classList.remove('run'); void el.offsetWidth; });
  [ov, bg, shout, word].forEach(el => el.classList.add('run'));

  ov.style.opacity = '';
  celebrateTimer = setTimeout(() => {
    [ov, bg, shout, word].forEach(el => el.classList.remove('run'));
    ov.style.opacity = '0';
    celebrateTimer = null;
  }, 10300);

  playGoalSound();
  confetti(color);
}

function playGoalSound() {
  try {
    // Stop any currently playing instance
    if (champAudio) { champAudio.pause(); champAudio.currentTime = 0; }
    champAudio = new Audio(CHAMPIONS_SRC);
    champAudio.volume = 0.85;
    champAudio.play().catch(e => console.warn('Audio play failed:', e));
    // Fade out after 10s
    setTimeout(() => {
      if (!champAudio) return;
      let vol = champAudio.volume;
      const fade = setInterval(() => {
        vol = Math.max(0, vol - 0.05);
        if (champAudio) champAudio.volume = vol;
        if (vol <= 0) { clearInterval(fade); if (champAudio) { champAudio.pause(); champAudio = null; } }
      }, 100);
    }, 9000);
  } catch(e) { console.warn('Audio error:', e); }
  cheer(); // crowd noise on top
}


// ─── Bump animation ──────────────────────────────────────────────────────────
function bump(id) {
  const el=document.getElementById(id);
  if(!el)return;
  el.classList.remove('bump');
  void el.offsetWidth;
  el.classList.add('bump');
  el.addEventListener('animationend',()=>el.classList.remove('bump'),{once:true});
}

// ─── Manual score buttons ─────────────────────────────────────────────────────
function adjustScore(side, delta) {
  if (side === 'home') {
    manualH = Math.max(0, (manualH ?? prevH ?? 0) + delta);
    if (delta > 0) { bump('sh'); celebrate(flag(currentHome)+' '+currentHome, currentHome); }
    document.getElementById('sh').textContent = manualH;
  } else {
    manualA = Math.max(0, (manualA ?? prevA ?? 0) + delta);
    if (delta > 0) { bump('sa'); celebrate(flag(currentAway)+' '+currentAway, currentAway); }
    document.getElementById('sa').textContent = manualA;
  }
}

// ─── ESPN API (works from browsers via direct fetch) ─────────────────────────
function debugLog(msg) {
  const el = document.getElementById('debug-log');
  if (el) el.textContent += msg + '\n';
  console.log('[WC]', msg);
}

async function fetchESPN() {
  // Fetch without date filter so ESPN returns whatever is live/most recent.
  // Also try a yesterday-today date range in case a match started before midnight UTC.
  const pad = n => String(n).padStart(2,'0');
  const fmtDate = d => d.getUTCFullYear().toString() + pad(d.getUTCMonth()+1) + pad(d.getUTCDate());
  const todayUTC = new Date();
  const yesterdayUTC = new Date(Date.now() - 86400000);
  const dateRange = fmtDate(yesterdayUTC) + '-' + fmtDate(todayUTC);
  const bust = '&t=' + Date.now();

  const base = 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard';
  // Also compute today in US Eastern time (UTC-4 in summer), since ESPN uses ET dates
  const etNow = new Date(Date.now() - 4*60*60*1000);
  const etDate = etNow.getUTCFullYear().toString() + pad(etNow.getUTCMonth()+1) + pad(etNow.getUTCDate());
  const urls = [
    base + '?dates=' + etDate + '&limit=20' + bust,
    base + '?dates=' + dateRange + '&limit=20' + bust,
    base + '?limit=20' + bust,
    'https://corsproxy.io/?' + encodeURIComponent(base + '?dates=' + etDate + '&limit=20'),
  ];

  for (const url of urls) {
    try {
      debugLog('Trying: ' + url.substring(0, 90));
      const r = await fetch(url, {cache:'no-store'});
      if (!r.ok) { debugLog('HTTP ' + r.status); continue; }
      const data = await r.json();
      const events = data.events || [];
      debugLog('Got ' + events.length + ' events');
      events.forEach(ev => {
        const comp = ev.competitions?.[0];
        const status = comp?.status?.type?.name || '?';
        const home = comp?.competitors?.find(c=>c.homeAway==='home')?.team?.displayName || '?';
        const away = comp?.competitors?.find(c=>c.homeAway==='away')?.team?.displayName || '?';
        const hs = comp?.competitors?.find(c=>c.homeAway==='home')?.score || 0;
        const as = comp?.competitors?.find(c=>c.homeAway==='away')?.score || 0;
        debugLog('  ' + home + ' ' + hs + '-' + as + ' ' + away + ' [' + status + ']');
      });
      const parsed = parseESPN(data);
      if (parsed) debugLog('Selected: ' + parsed.home + ' vs ' + parsed.away + ' [live:' + parsed.isLive + ']');
      return parsed;
    } catch(e) { debugLog('Error: ' + e.message); continue; }
  }
  return null;
}

function parseESPN(data) {
  const events = data.events || [];
  if (!events.length) return null;

  // Priority: in-progress > most recently started > upcoming
  const now = Date.now();
  let best = null, bestScore = -Infinity;

  for (const ev of events) {
    const comp = ev.competitions?.[0];
    if (!comp) continue;
    const statusName = comp.status?.type?.name || '';
    const ko = new Date(comp.startDate || ev.date).getTime();
    let score = 0;
    // Strict tiers: live (3000+) > half-time (2000+) > finished (1000+) > upcoming (negative)
    // Within finished matches, prefer the most recent one (largest ko value)
    // ESPN uses various status names - cover all live variants
    const isLiveStatus = ['STATUS_IN_PROGRESS', 'STATUS_IN_PROGRESS_2', 'STATUS_SECOND_HALF',
      'STATUS_FIRST_HALF', 'STATUS_EXTRA_TIME', 'STATUS_PENALTY'].includes(statusName);
    const isHTStatus = statusName === 'STATUS_HALFTIME';
    const isFTStatus = ['STATUS_FINAL', 'STATUS_FULL_TIME', 'STATUS_FT'].includes(statusName);

    if (isLiveStatus) score = 3000 + ko;
    else if (isHTStatus) score = 2000 + ko;
    else if (isFTStatus) score = 1000 + ko / 1e12;
    else score = -(ko - now)/1000; // upcoming: higher = sooner

    debugLog('  status raw: [' + statusName + '] -> score tier: ' + (isLiveStatus?'LIVE':isHTStatus?'HT':isFTStatus?'FT':'upcoming'));

    if (score > bestScore) { bestScore = score; best = { ev, comp }; }
  }

  if (!best) return null;
  const { ev, comp } = best;
  const home = comp.competitors?.find(c=>c.homeAway==='home');
  const away = comp.competitors?.find(c=>c.homeAway==='away');
  const statusName = comp.status?.type?.name || '';
  const clock = comp.status?.displayClock || '';
  const period = comp.status?.period || 1;

  // Parse goal scorers from linescores/leaders
  const goals = [];
  (comp.details || []).forEach(d => {
    if (d.scoreValue > 0) {
      goals.push({
        minute: d.clock?.displayValue || '?',
        name: d.athletesInvolved?.[0]?.displayName || '',
        team: d.team?.displayName || '',
        teamFlag: flag(d.team?.displayName || '')
      });
    }
  });

  return {
    home: home?.team?.displayName || '',
    away: away?.team?.displayName || '',
    homeScore: parseInt(home?.score || 0),
    awayScore: parseInt(away?.score || 0),
    isLive: ['STATUS_IN_PROGRESS','STATUS_IN_PROGRESS_2','STATUS_SECOND_HALF',
      'STATUS_FIRST_HALF','STATUS_EXTRA_TIME','STATUS_PENALTY'].includes(statusName),
    isHT: statusName === 'STATUS_HALFTIME',
    isFT: ['STATUS_FINAL','STATUS_FULL_TIME','STATUS_FT'].includes(statusName),
    isUpcoming: ['STATUS_SCHEDULED','STATUS_PRE'].includes(statusName),
    clock,
    period,
    group: ev.season?.slug || '',
    venue: comp.venue?.fullName || '',
    kickoff: new Date(comp.startDate || ev.date),
    goals,
    source: 'espn'
  };
}

// ─── Render ───────────────────────────────────────────────────────────────────
function renderMatch(m) {
  const card = document.getElementById('card');
  const content = document.getElementById('content');
  currentHome = m.home;
  currentAway = m.away;

  const hf = flag(m.home), af = flag(m.away);
  const hs = manualH !== null ? manualH : m.homeScore;
  const as = manualA !== null ? manualA : m.awayScore;

  // Detect goals from API (only when not overridden manually)
  if (manualH === null && manualA === null) {
    if (prevH !== null && hs > prevH) { celebrate(hf+' '+m.home, m.home); bump('sh'); }
    if (prevA !== null && as > prevA) { celebrate(af+' '+m.away, m.away); bump('sa'); }
  }
  prevH = hs; prevA = as;

  card.className = m.isLive ? 'card live' : 'card';

  // Status pill
  let pill = '';
  if (m.isLive) {
    const min = m.clock ? `· ${m.clock}` : '';
    pill = `<div class="pill-live"><div class="dot"></div>Live ${min}</div>`;
  } else if (m.isHT) {
    pill = `<div class="pill-ht">Half Time</div>`;
  } else if (m.isFT) {
    pill = `<div class="pill-ft">Full Time</div>`;
  } else if (m.isUpcoming) {
    const t = m.kickoff.toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'});
    const d = m.kickoff.toLocaleDateString('nl-NL',{weekday:'short',day:'numeric',month:'short'});
    pill = `<div class="pill-up">⏱ ${d} · ${t}</div>`;
  }

  // Goals list
  let goalsHtml = '';
  if (m.goals && m.goals.length) {
    goalsHtml = `<div class="goals-wrap">${m.goals.map(g=>`
      <div class="goal-row">
        <span>⚽</span>
        <span class="g-min">${g.minute}'</span>
        <span class="g-name">${g.name||'–'}</span>
        <span class="g-team">${g.teamFlag} ${g.team}</span>
      </div>`).join('')}</div>`;
  }

  const showScore = !m.isUpcoming;

  content.innerHTML = `
    <div class="status-row">
      ${pill}
      <span class="group-tag">${m.group||''}</span>
    </div>
    <div class="matchup">
      <div class="team"><div class="flag">${hf}</div><div class="team-name">${m.home}</div></div>
      <div class="score-mid">
        ${showScore ? `
          <div class="score-row">
            <div class="snum" id="sh">${hs}</div>
            <div class="ssep">–</div>
            <div class="snum" id="sa">${as}</div>
          </div>
          <div class="venue">${(m.venue||'').split(',')[0]}</div>
        ` : `
          <div class="ko-time">${m.kickoff.toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'})}</div>
          <div class="ko-date">${m.kickoff.toLocaleDateString('nl-NL',{weekday:'long',day:'numeric',month:'long'})}</div>
        `}
      </div>
      <div class="team"><div class="flag">${af}</div><div class="team-name">${m.away}</div></div>
    </div>
    ${goalsHtml}
    ${showScore ? `
    <div class="manual-controls">
      <div style="display:flex;flex-direction:column;gap:6px;align-items:center">
        <div class="manual-label">Test score</div>
        <div style="display:flex;gap:1.5rem">
          <div class="team-ctrl">
            <span class="ctrl-label" style="font-size:10px">${m.home.split(' ')[0]}</span>
            <button class="btn-score minus" onclick="adjustScore('home',-1)">−</button>
            <button class="btn-score plus" onclick="adjustScore('home',1)">+</button>
          </div>
          <div class="team-ctrl">
            <button class="btn-score minus" onclick="adjustScore('away',-1)">−</button>
            <button class="btn-score plus" onclick="adjustScore('away',1)">+</button>
            <span class="ctrl-label" style="font-size:10px">${m.away.split(' ')[0]}</span>
          </div>
        </div>
      </div>
    </div>
    ` : ''}
    <div class="src-badge">via ESPN · auto-refresh every 30s</div>`;
}

// ─── Main fetch loop ──────────────────────────────────────────────────────────
async function fetchAndRender() {
  const btn = document.getElementById('rbtn');
  btn.classList.add('spin');

  const m = await fetchESPN();

  if (!m) {
    document.getElementById('content').innerHTML = `
      <div class="err">
        Could not load live data.<br>
        <small style="font-size:11px">Make sure you're online.<br>Use the +/− buttons to test manually.</small>
      </div>`;
  } else {
    renderMatch(m);
  }

  const now = new Date();
  document.getElementById('upd').textContent =
    'Updated '+now.toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit',second:'2-digit'});

  btn.classList.remove('spin');

  clearInterval(autoTimer);
  autoTimer = setInterval(fetchAndRender, 30000);
}

fetchAndRender();
window.addEventListener('resize',()=>{
  const c=document.getElementById('confetti');
  c.width=window.innerWidth;c.height=window.innerHeight;
});
</script>
